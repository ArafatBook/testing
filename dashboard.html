<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Quill Rich Text Editor CSS -->
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif; background: linear-gradient(135deg,#0f2027,#203a43,#2c5364); color:white; display:flex;}

/* Sidebar */
.sidebar{width:250px;height:100vh;background: rgba(0,0,0,0.6);backdrop-filter: blur(20px);padding:25px;position:fixed;border-right:1px solid rgba(255,255,255,0.1);}
.logo{font-size:24px;font-weight:bold;margin-bottom:50px;color:#00e676;}
.nav a{display:block;padding:14px 12px;margin-bottom:12px;text-decoration:none;color:#ccc;font-weight:500;border-radius:12px;transition:0.3s;}
.nav a:hover{background:#00c6ff;color:#111;transform:translateX(5px);}

/* Main Content */
.main{margin-left:250px;padding:30px;width:100%;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;}
.topbar h2{font-weight:600;color:#00e676;}
.logout-btn{background:#ff5252;border:none;padding:8px 18px;color:white;border-radius:10px;cursor:pointer;font-weight:500;}
.logout-btn:hover{background:#ff1744;transform:scale(1.05);}

/* Stats Cards */
.cards{display:grid;grid-template-columns: repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:40px;}
.card{background: rgba(255,255,255,0.08);backdrop-filter: blur(15px);padding:25px;border-radius:18px;box-shadow:0 8px 20px rgba(0,0,0,0.35);}
.card h3{color:#00e676;margin-bottom:12px;}
.card p{font-size:28px;font-weight:bold;color:white;}

/* Form Box */
.form-box{background: rgba(255,255,255,0.08);padding:30px;border-radius:20px;backdrop-filter: blur(15px);margin-bottom:40px;}
.form-box h3{margin-bottom:20px;color:#00e676;}
input{width:100%;padding:14px;margin-bottom:15px;border-radius:12px;border:none;background:#1f1f1f;color:white;font-size:16px;}

/* Publish Button */
button.publish{background:#00e676;border:none;padding:14px 25px;border-radius:12px;cursor:pointer;font-weight:bold;font-size:16px;transition:0.3s;}
button.publish:hover{background:#00c853;transform:scale(1.05);}

/* Quill Editor */
#editor{background:white;color:black;height:280px;border-radius:12px;margin-bottom:15px;padding:10px;box-shadow:0 5px 15px rgba(0,0,0,0.25);}

/* Quill Toolbar */
.ql-toolbar.ql-snow{border-radius:12px 12px 0 0;background:#f3f3f3;}

/* Post List */
.post-list{margin-top:30px;}
.post-item{background: rgba(255,255,255,0.08);padding:18px 20px;border-radius:15px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 6px 18px rgba(0,0,0,0.3);}
.post-item:hover{transform:translateY(-3px);}
.post-item h4{color:#00e676;font-size:18px;}
.delete-btn{background:#ff5252;border:none;padding:8px 14px;border-radius:10px;color:white;cursor:pointer;font-weight:500;transition:0.3s;}
.delete-btn:hover{background:#ff1744;transform:scale(1.05);}

/* Responsive */
@media(max-width:768px){.sidebar{display:none;}.main{margin-left:0;padding:20px;}}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">Admin Panel</div>
  <div class="nav">
    <a href="#">Dashboard</a>
    <a href="#">Create Post</a>
    <a href="#">All Posts</a>
  </div>
</div>

<div class="main">

  <div class="topbar">
    <h2>Dashboard Overview</h2>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <!-- Stats Cards -->
  <div class="cards">
    <div class="card">
      <h3>Total Posts</h3>
      <p id="totalPosts">0</p>
    </div>
    <div class="card">
      <h3>Visitors</h3>
      <p>--</p>
    </div>
    <div class="card">
      <h3>Comments</h3>
      <p>--</p>
    </div>
  </div>

  <!-- Create Post Form -->
  <div class="form-box">
    <h3>Create New Post</h3>
    <input type="text" id="title" placeholder="Post Title">
    <div id="editor"></div>
    <button class="publish" onclick="publish()">Publish Post</button>
  </div>

  <!-- Post List -->
  <div class="post-list" id="posts"></div>

</div>

<!-- Quill JS -->
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<!-- DOMPurify for safe HTML -->
<script src="https://cdn.jsdelivr.net/npm/dompurify@2.4.1/dist/purify.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// Firebase config
const firebaseConfig = { apiKey:"YOUR_API_KEY", authDomain:"YOUR_DOMAIN", projectId:"YOUR_PROJECT_ID" };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// Protect dashboard
onAuthStateChanged(auth,user=>{ if(!user) window.location.href="login.html"; });

// Quill editor with text-only toolbar
var quill = new Quill('#editor', { 
  theme:'snow',
  modules: {
    toolbar: [
      [{ 'font': [] }],
      [{ 'header': [1,2,3, false] }],
      ['bold', 'italic', 'underline', 'strike'],
      [{ 'list': 'ordered'}, { 'list': 'bullet' }],
      ['blockquote', 'code-block'],
      ['link'],
      [{ 'color': [] }, { 'background': [] }],
      [{ 'align': [] }],
      ['clean']
    ]
  }
});

// Load posts
async function loadPosts(){
  const snapshot = await getDocs(collection(db,"posts"));
  const postsContainer = document.getElementById("posts");
  postsContainer.innerHTML = "";
  document.getElementById("totalPosts").innerText = snapshot.size;
  snapshot.forEach(docSnap=>{
    const data = docSnap.data();
    postsContainer.innerHTML += `
      <div class="post-item">
        <h4>${data.title}</h4>
        <div>${DOMPurify.sanitize(data.content)}</div>
        <button class="delete-btn" onclick="deletePost('${docSnap.id}')">Delete</button>
      </div>`;
  });
}

// Delete post
window.deletePost = async function(id){
  await deleteDoc(doc(db,"posts",id));
  loadPosts();
}

// Publish post
window.publish = async function(){
  const title = document.getElementById("title").value;
  const content = DOMPurify.sanitize(quill.root.innerHTML);
  if(!title || !content){ alert("Title & Content required"); return; }
  await addDoc(collection(db,"posts"), {title, content, createdAt:new Date()});
  document.getElementById("title").value="";
  quill.setContents([]);
  loadPosts();
}

// Logout
window.logout = ()=>{ signOut(auth).then(()=>window.location.href="login.html"); }

// Initial load
loadPosts();
</script>

</body>
</html>
