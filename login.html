<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{display:flex; justify-content:center; align-items:center; height:100vh; background:linear-gradient(135deg,#0f2027,#203a43,#2c5364); font-family:'Segoe UI',sans-serif;}
.login-box{background:rgba(0,0,0,0.6); padding:40px; border-radius:15px; backdrop-filter:blur(20px); color:white; width:300px; text-align:center;}
input{width:100%; padding:12px; margin:12px 0; border-radius:10px; border:none; background:#1f1f1f; color:white;}
button{width:100%; padding:12px; border:none; border-radius:10px; background:#00e676; font-weight:bold; cursor:pointer;}
button:hover{background:#00c853;}
</style>
</head>
<body>
<div class="login-box">
<h2>Admin Login</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey:"YOUR_API_KEY",
  authDomain:"YOUR_DOMAIN",
  projectId:"YOUR_PROJECT_ID"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

function login(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;
  signInWithEmailAndPassword(auth,email,pass)
    .then(()=>{ window.location.href="dashboard.html"; })
    .catch(err=>alert(err.message));
}
</script>
</body>
</html>
